name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# checkout@v6 and upload-artifact@v7 ship Node 24 natively. setup-zig@v2
# still ships Node 20, so keep the runner-level Node 24 opt-in until mlugg
# cuts a Node 24 release; drop this once it does.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # PR smoke test. Builds every (target, kind) with -Dskip-pack=true so we
  # never have to pull the LFS-backed resources submodule. No artifacts are
  # uploaded — the build exit code is the signal.
  dev:
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-linux-gnu,   name: linux,      kind: game,   extra: "-Dcpu=x86_64_v3 -Duse-cwd=true" }
          - { os: ubuntu-latest,  target: x86_64-linux-gnu,   name: linux_gl,   kind: game,   extra: "-Dcpu=x86_64_v3 -Dgfx=opengl -Duse-cwd=true" }
          - { os: ubuntu-latest,  target: x86_64-linux-gnu,   name: linux,      kind: server, extra: -Dcpu=x86_64_v3 }
          - { os: macos-latest,   target: aarch64-macos,      name: mac,        kind: game,   extra: "" }
          - { os: macos-latest,   target: aarch64-macos,      name: mac,        kind: server, extra: "" }
          - { os: windows-latest, target: x86_64-windows-gnu, name: windows,    kind: game,   extra: "-Dcpu=x86_64_v3 -Duse-cwd=true" }
          - { os: windows-latest, target: x86_64-windows-gnu, name: windows_gl, kind: game,   extra: "-Dcpu=x86_64_v3 -Dgfx=opengl -Duse-cwd=true" }
          - { os: windows-latest, target: x86_64-windows-gnu, name: windows,    kind: server, extra: -Dcpu=x86_64_v3 }
          - { os: ubuntu-latest,  target: mipsel-psp,         name: psp_phat,   kind: game,   extra: "" }
          - { os: ubuntu-latest,  target: mipsel-psp,         name: psp_slim,   kind: game,   extra: -Dslim=true }
          - { os: ubuntu-latest,  target: mipsel-psp,         name: psp,        kind: server, extra: "" }
    runs-on: ${{ matrix.os }}
    name: dev ${{ matrix.kind }} (${{ matrix.name }})
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Setup macOS SDK
        if: matrix.name == 'mac'
        run: echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV

      # macOS game links MoltenVK and system glfw3 directly; both get bundled
      # into the .app by Aether.exportArtifact. Other targets vendor everything.
      - name: Install macOS dependencies
        if: matrix.name == 'mac' && matrix.kind == 'game'
        run: brew install glfw molten-vk

      - name: Build (smoke)
        run: zig build ${{ matrix.kind }} -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe ${{ matrix.extra }} -Dskip-pack=true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dev-${{ matrix.kind }}_${{ matrix.name }}
          path: zig-out/bin/
          if-no-files-found: error

  # Full release-style builds on push to main / v* tags. Pulls LFS for game
  # builds so pack.zip ships with real resources, runs per-platform artifact
  # verification, and uploads each (kind, target) as a separate workflow
  # artifact for download.
  rel:
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-linux-gnu,   name: linux,      kind: game,   extra: -Dcpu=x86_64_v3 }
          - { os: ubuntu-latest,  target: x86_64-linux-gnu,   name: linux_gl,   kind: game,   extra: "-Dcpu=x86_64_v3 -Dgfx=opengl" }
          - { os: ubuntu-latest,  target: x86_64-linux-gnu,   name: linux,      kind: server, extra: -Dcpu=x86_64_v3 }
          - { os: macos-latest,   target: aarch64-macos,      name: mac,        kind: game,   extra: "" }
          - { os: macos-latest,   target: aarch64-macos,      name: mac,        kind: server, extra: "" }
          - { os: windows-latest, target: x86_64-windows-gnu, name: windows,    kind: game,   extra: -Dcpu=x86_64_v3 }
          - { os: windows-latest, target: x86_64-windows-gnu, name: windows_gl, kind: game,   extra: "-Dcpu=x86_64_v3 -Dgfx=opengl" }
          - { os: windows-latest, target: x86_64-windows-gnu, name: windows,    kind: server, extra: -Dcpu=x86_64_v3 }
          - { os: ubuntu-latest,  target: mipsel-psp,         name: psp_phat,   kind: game,   extra: "" }
          - { os: ubuntu-latest,  target: mipsel-psp,         name: psp_slim,   kind: game,   extra: -Dslim=true }
          - { os: ubuntu-latest,  target: mipsel-psp,         name: psp,        kind: server, extra: "" }
    runs-on: ${{ matrix.os }}
    name: rel ${{ matrix.kind }} (${{ matrix.name }})
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          # Game builds need real resources to produce a valid pack.zip;
          # server builds never touch the resources submodule, so skip LFS.
          lfs: ${{ matrix.kind == 'game' }}

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Setup macOS SDK
        if: matrix.name == 'mac'
        run: echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV

      - name: Install macOS dependencies
        if: matrix.name == 'mac' && matrix.kind == 'game'
        run: brew install glfw molten-vk

      # Server never packs resources — same command for every platform.
      - name: Build server
        if: matrix.kind == 'server'
        run: zig build server -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe ${{ matrix.extra }} -Dskip-pack=true

      # Desktop game (linux/windows): -Duse-cwd=true so pack.zip ships as a
      # loose file in zig-out/bin/ next to the binary.
      - name: Build game (desktop)
        if: matrix.kind == 'game' && (startsWith(matrix.name, 'linux') || startsWith(matrix.name, 'windows'))
        run: zig build game -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe ${{ matrix.extra }} -Duse-cwd=true

      # macOS game: Aether.exportArtifact routes pack.zip into
      # CrossCraft-Classic.app/Contents/Resources/pack.zip — no -Duse-cwd.
      - name: Build game (macOS)
        if: matrix.kind == 'game' && matrix.name == 'mac'
        run: zig build game -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe

      # PSP game (phat/slim): build.zig installs pack.zip into the PSP
      # bundle dir alongside EBOOT.PBP / app.prx.
      - name: Build game (PSP)
        if: matrix.kind == 'game' && (matrix.name == 'psp_phat' || matrix.name == 'psp_slim')
        run: zig build game -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe ${{ matrix.extra }}

      # pack.zip size check guards against LFS regressions on every game
      # platform: a pointer stub is ~130 B, a real pack is multi-MB.
      - name: Verify desktop game artifact
        if: matrix.kind == 'game' && (startsWith(matrix.name, 'linux') || startsWith(matrix.name, 'windows'))
        shell: bash
        run: |
          pack="zig-out/bin/pack.zip"
          test -f "$pack" || { echo "missing $pack"; exit 1; }
          size=$(wc -c <"$pack")
          test "$size" -gt 1000000 || { echo "pack.zip only $size bytes (LFS stubs?)"; exit 1; }
          echo "pack.zip OK ($size bytes)"

      - name: Verify macOS bundle
        if: matrix.kind == 'game' && matrix.name == 'mac'
        run: |
          otool -L zig-out/bin/CrossCraft-Classic.app/Contents/MacOS/CrossCraft-Classic
          otool -l zig-out/bin/CrossCraft-Classic.app/Contents/MacOS/CrossCraft-Classic | grep -A2 LC_RPATH
          codesign --verify --verbose zig-out/bin/CrossCraft-Classic.app
          pack="zig-out/bin/CrossCraft-Classic.app/Contents/Resources/pack.zip"
          test -f "$pack" || { echo "missing $pack"; exit 1; }
          size=$(stat -f%z "$pack")
          test "$size" -gt 1000000 || { echo "pack.zip only $size bytes (LFS stubs?)"; exit 1; }
          echo "pack.zip OK ($size bytes)"

      # ditto preserves .app metadata / symlinks better than zip;
      # actions/upload-artifact otherwise re-zips and can mangle bundles.
      - name: Package macOS .app
        if: matrix.kind == 'game' && matrix.name == 'mac'
        run: ditto -c -k --keepParent zig-out/bin/CrossCraft-Classic.app CrossCraft-Classic-macos.zip

      - name: Verify PSP game artifact
        if: matrix.kind == 'game' && (matrix.name == 'psp_phat' || matrix.name == 'psp_slim')
        run: |
          eboot="zig-out/bin/CrossCraft-Classic-PSP/EBOOT.PBP"
          pack="zig-out/bin/CrossCraft-Classic-PSP/pack.zip"
          test -s "$eboot" || { echo "missing or empty $eboot"; exit 1; }
          test -f "$pack" || { echo "missing $pack"; exit 1; }
          size=$(wc -c <"$pack")
          test "$size" -gt 1000000 || { echo "pack.zip only $size bytes (LFS stubs?)"; exit 1; }
          echo "PSP game OK (EBOOT.PBP + pack.zip $size bytes)"

      - name: Verify PSP server artifact
        if: matrix.kind == 'server' && matrix.name == 'psp'
        run: |
          eboot="zig-out/bin/CrossCraft-Server-PSP/EBOOT.PBP"
          test -s "$eboot" || { echo "missing or empty $eboot"; exit 1; }
          echo "PSP server OK"

      - name: Upload macOS .app
        if: matrix.kind == 'game' && matrix.name == 'mac'
        uses: actions/upload-artifact@v7
        with:
          name: game_mac
          path: CrossCraft-Classic-macos.zip
          if-no-files-found: error

      - name: Upload artifact
        if: matrix.kind != 'game' || matrix.name != 'mac'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.kind }}_${{ matrix.name }}
          path: zig-out/bin/
          if-no-files-found: error

  # Build the pack_zip host tool for distribution. This is the canonical
  # way to produce a CrossCraft pack.zip from a resource directory.
  pack-tool:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  name: linux }
          - { os: macos-latest,   name: mac }
          - { os: windows-latest, name: windows }
    runs-on: ${{ matrix.os }}
    name: pack-tool (${{ matrix.name }})
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Build pack_zip
        run: zig build pack-tool -Doptimize=ReleaseSafe

      - name: Upload pack-tool
        uses: actions/upload-artifact@v7
        with:
          name: pack-tool_${{ matrix.name }}
          path: zig-out/bin/
          if-no-files-found: error

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_server:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            name: linux
            extra: -Dcpu=x86_64_v3
          - os: macos-latest
            target: aarch64-macos
            name: mac
            extra:
          - os: windows-latest
            target: x86_64-windows-gnu
            name: windows
            extra: -Dcpu=x86_64_v3
          - os: ubuntu-latest
            target: mipsel-psp
            name: psp
            extra:
    runs-on: ${{ matrix.os }}
    name: server (${{ matrix.name }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Build server
        run: zig build server -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe ${{ matrix.extra }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server_${{ matrix.name }}
          path: zig-out/
          if-no-files-found: error

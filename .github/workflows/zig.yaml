name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_server:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            name: linux
            extra: -Dcpu=x86_64_v3
          - os: macos-latest
            target: aarch64-macos
            name: mac
            extra:
          - os: windows-latest
            target: x86_64-windows-gnu
            name: windows
            extra: -Dcpu=x86_64_v3
          - os: ubuntu-latest
            target: mipsel-psp
            name: psp
            extra:
    runs-on: ${{ matrix.os }}
    name: server (${{ matrix.name }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Setup macOS SDK (for frameworks)
        if: matrix.name == 'mac'
        run: echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV

      - name: Build server
        run: zig build server -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe ${{ matrix.extra }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server_${{ matrix.name }}
          path: zig-out/
          if-no-files-found: error

  build_game:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            name: linux
            extra: -Dcpu=x86_64_v3
          - os: macos-latest
            target: aarch64-macos
            name: mac
            extra:
          - os: windows-latest
            target: x86_64-windows-gnu
            name: windows
            extra: -Dcpu=x86_64_v3
          - os: ubuntu-latest
            target: mipsel-psp
            name: psp_phat
            extra:
          - os: ubuntu-latest
            target: mipsel-psp
            name: psp_slim
            extra: -Dslim=true
    runs-on: ${{ matrix.os }}
    name: game (${{ matrix.name }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Setup macOS SDK (for frameworks)
        if: matrix.name == 'mac'
        run: echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV

      # macOS links MoltenVK directly (no Vulkan loader) and system glfw3;
      # both get bundled into the .app by Aether.exportArtifact. Other
      # targets use vendored packages and need no system libs.
      - name: Install macOS dependencies
        if: matrix.name == 'mac'
        run: brew install glfw molten-vk

      - name: Build game
        run: zig build game -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe -Dskip-pack=true ${{ matrix.extra }}

      - name: Verify macOS bundle
        if: matrix.name == 'mac'
        run: |
          otool -L zig-out/bin/CrossCraft-Classic.app/Contents/MacOS/CrossCraft-Classic
          otool -l zig-out/bin/CrossCraft-Classic.app/Contents/MacOS/CrossCraft-Classic | grep -A2 LC_RPATH
          codesign --verify --verbose zig-out/bin/CrossCraft-Classic.app

      - name: Package macOS .app
        if: matrix.name == 'mac'
        # ditto preserves .app metadata / symlink structure better than zip.
        # GitHub's upload-artifact otherwise re-zips and can mangle bundles.
        run: ditto -c -k --keepParent zig-out/bin/CrossCraft-Classic.app CrossCraft-Classic-macos.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: game_${{ matrix.name }}
          path: ${{ matrix.name == 'mac' && 'CrossCraft-Classic-macos.zip' || 'zig-out/' }}
          if-no-files-found: error

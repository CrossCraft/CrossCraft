name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt in to Node.js 24 for JavaScript actions. Our pinned actions
# (checkout@v4, upload-artifact@v4, setup-zig@v2) still ship Node.js
# 20 binaries, which GitHub deprecated and will hard-disable 2026-09-16.
# The opt-in flag forces the runner to use its bundled Node 24 instead;
# drop this once the actions publish Node 24 releases of their own.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build_server:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            name: linux
            extra: -Dcpu=x86_64_v3
          - os: macos-latest
            target: aarch64-macos
            name: mac
            extra:
          - os: windows-latest
            target: x86_64-windows-gnu
            name: windows
            extra: -Dcpu=x86_64_v3
          - os: ubuntu-latest
            target: mipsel-psp
            name: psp
            extra:
    runs-on: ${{ matrix.os }}
    name: server (${{ matrix.name }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Setup macOS SDK (for frameworks)
        if: matrix.name == 'mac'
        run: echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV

      - name: Build server
        run: zig build server -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe ${{ matrix.extra }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server_${{ matrix.name }}
          path: zig-out/
          if-no-files-found: error

  build_game:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            name: linux
            extra: -Dcpu=x86_64_v3
            is_desktop: true
          - os: macos-latest
            target: aarch64-macos
            name: mac
            extra:
            is_desktop: false
          - os: windows-latest
            target: x86_64-windows-gnu
            name: windows
            extra: -Dcpu=x86_64_v3
            is_desktop: true
          - os: ubuntu-latest
            target: mipsel-psp
            name: psp_phat
            extra: -Dskip-pack=true
            is_desktop: false
          - os: ubuntu-latest
            target: mipsel-psp
            name: psp_slim
            extra: -Dslim=true -Dskip-pack=true
            is_desktop: false
    runs-on: ${{ matrix.os }}
    name: game (${{ matrix.name }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          # LFS is needed wherever we zip real resources (push/tag only).
          # PR builds skip packing on all platforms to keep smoke tests fast.
          lfs: ${{ (matrix.name == 'mac' || matrix.is_desktop) && github.event_name != 'pull_request' }}

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Setup macOS SDK (for frameworks)
        if: matrix.name == 'mac'
        run: echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV

      # macOS links MoltenVK directly (no Vulkan loader) and system glfw3;
      # both get bundled into the .app by Aether.exportArtifact. Other
      # targets use vendored packages and need no system libs.
      - name: Install macOS dependencies
        if: matrix.name == 'mac'
        run: brew install glfw molten-vk

      # PR builds: smoke-test only — skip packing to avoid pulling LFS.
      - name: Build game (PR)
        if: (matrix.is_desktop || matrix.name == 'mac') && github.event_name == 'pull_request'
        run: zig build game -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe ${{ matrix.extra }} -Dskip-pack=true

      # Push/tag builds: full artifact — pack.zip alongside binary via -Duse-cwd.
      - name: Build game
        if: "!((matrix.is_desktop || matrix.name == 'mac') && github.event_name == 'pull_request')"
        run: zig build game -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe ${{ matrix.extra }} ${{ matrix.is_desktop && '-Duse-cwd=true' || '' }}

      - name: Verify macOS bundle
        if: matrix.name == 'mac' && github.event_name != 'pull_request'
        # pack.zip size check guards against LFS regressions: a pointer
        # stub is ~130 B, a real pack is multi-MB. Fail loudly if we
        # accidentally zip pointer files.
        run: |
          otool -L zig-out/bin/CrossCraft-Classic.app/Contents/MacOS/CrossCraft-Classic
          otool -l zig-out/bin/CrossCraft-Classic.app/Contents/MacOS/CrossCraft-Classic | grep -A2 LC_RPATH
          codesign --verify --verbose zig-out/bin/CrossCraft-Classic.app
          pack="zig-out/bin/CrossCraft-Classic.app/Contents/Resources/pack.zip"
          test -f "$pack" || { echo "missing $pack"; exit 1; }
          size=$(stat -f%z "$pack")
          test "$size" -gt 1000000 || { echo "pack.zip only $size bytes (LFS stubs?)"; exit 1; }
          echo "pack.zip OK ($size bytes)"

      - name: Package macOS .app
        if: matrix.name == 'mac' && github.event_name != 'pull_request'
        # ditto preserves .app metadata / symlink structure better than zip.
        # GitHub's upload-artifact otherwise re-zips and can mangle bundles.
        run: ditto -c -k --keepParent zig-out/bin/CrossCraft-Classic.app CrossCraft-Classic-macos.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: game_${{ matrix.name }}
          path: ${{ matrix.name == 'mac' && github.event_name != 'pull_request' && 'CrossCraft-Classic-macos.zip' || 'zig-out/' }}
          if-no-files-found: error
